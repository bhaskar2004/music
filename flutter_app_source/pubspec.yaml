name: wavelength_app
description: "Wavelength Premium Music Player"
publish_to: 'none'
version: 2.0.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # Database
  path: ^1.9.0

  # Audio playback
  just_audio: ^0.10.5
  just_audio_background: ^0.0.1-beta.15
  audio_session: ^0.2.3

  # YouTube extraction (replaces yt-dlp on mobile)
  youtube_explode_dart: ^3.0.5

  # Networking / file I/O
  dio: ^5.4.0
  path_provider: ^2.1.2

  # Permissions
  permission_handler: ^12.0.1
  device_info_plus: ^10.1.0

  # UI
  google_fonts: ^8.0.2
  cached_network_image: ^3.3.1
  cupertino_icons: ^1.0.6

  # Utilities
  shared_preferences: ^2.2.2
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
