name: Build Wavelength APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Note: @v4 is still current, but we'll stick to it

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Flutter Dependencies
        run: |
          cd flutter_app_source
          flutter pub get

      - name: Compile Release APK
        run: |
          cd flutter_app_source
          flutter build apk --release

      - name: Upload APK to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: Wavelength-App-Release.apk
          path: flutter_app_source/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
