name: Build Wavelength APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Prepare Flutter Project Structure
        run: |
          cd flutter_app_source
          # This safely generates the android/ and ios/ folders needed for the build
          flutter create --org com.wavelength --project-name wavelength_app .

      - name: Inject Android Manifest Configuration
        run: |
          cat <<EOF > flutter_app_source/android/app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.wavelength.wavelength_app">
              
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.WAKE_LOCK"/>
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>
              <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK"/>

             <application
                  android:label="Wavelength"
                  android:name="\${applicationName}"
                  android:icon="@mipmap/ic_launcher">
                  <activity
                      android:name="io.flutter.embedding.android.FlutterActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                        android:name="io.flutter.embedding.android.NormalThemes"
                        android:resource="@style/NormalTheme"
                        />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>

                  <service android:name="com.ryanheise.audioservice.AudioService"
                           android:foregroundServiceType="mediaPlayback"
                           android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <action android:name="android.intent.action.VIEW" />
                          <category android:name="android.intent.category.DEFAULT" />
                          <category android:name="android.intent.category.BROWSABLE" />
                          <action android:name="com.ryanheise.audioservice.NOTIFICATION_CLICK" />
                      </intent-filter>
                  </service>

                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
              </application>
          </manifest>
          EOF

      - name: Install Flutter Dependencies
        run: |
          cd flutter_app_source
          flutter pub get

      - name: Compile Release APK
        run: |
          cd flutter_app_source
          flutter build apk --release

      - name: Upload APK to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: Wavelength-App-Release.apk
          path: flutter_app_source/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
